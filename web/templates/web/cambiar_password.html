{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Seguridad - Tienda Coldplay</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'web/css/estilos.css' %}" />

    <style>
      /* FONDO ESPACIAL */
      body {
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        min-height: 100vh;
        color: white;
      }

      /* TARJETA DE SEGURIDAD */
      .security-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }

      .security-icon {
        font-size: 3rem;
        color: #ffc107;
        text-shadow: 0 0 15px rgba(255, 193, 7, 0.4);
        margin-bottom: 20px;
      }

      /* ESTILIZAR EL FORMULARIO AUTOMÁTICO DE DJANGO */
      form p {
        margin-bottom: 20px;
      }

      form label {
        display: block;
        color: #2afadf;
        font-weight: bold;
        font-size: 0.85rem;
        text-transform: uppercase;
        margin-bottom: 5px;
      }

      /* Seleccionamos los inputs generados por Django */
      form input {
        width: 100%;
        background: rgba(255, 255, 255, 0.1) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        color: white !important;
        border-radius: 10px;
        padding: 10px 15px;
        transition: 0.3s;
      }

      form input:focus {
        outline: none;
        border-color: #2afadf !important;
        box-shadow: 0 0 10px rgba(42, 250, 223, 0.3);
        background: rgba(255, 255, 255, 0.15) !important;
      }

      .helptext {
        display: block;
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.5);
        margin-top: 5px;
      }

      .errorlist {
        color: #ff4d4d;
        list-style: none;
        padding: 0;
        font-size: 0.85rem;
        margin-top: 5px;
      }

      /* BOTONES */
      .btn-update {
        background: linear-gradient(45deg, #f12711, #f5af19);
        border: none;
        color: white;
        font-weight: bold;
        padding: 12px;
        transition: 0.3s;
      }

      .btn-update:hover {
        transform: scale(1.02);
        box-shadow: 0 0 20px rgba(241, 39, 17, 0.4);
        color: white;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'inicio' %}"
          >Tienda Coldplay</a
        >
        <div class="ms-auto">
          <span class="text-white-50 small"
            ><i class="bi bi-shield-lock"></i> Conexión Segura</span
          >
        </div>
      </div>
    </nav>

    <div class="container mt-5 mb-5">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="security-card text-center">
            <div class="security-icon">
              <i class="bi bi-shield-lock-fill"></i>
            </div>

            <h2 class="fw-bold mb-2">Actualizar Contraseña</h2>
            <p class="text-white-50 mb-4 small">
              Ingresa tu contraseña actual y la nueva para asegurar tu cuenta.
            </p>

            <div class="text-start">
              <form method="POST">
                {% csrf_token %} {{ form.as_p }}

                <div class="d-grid gap-3 mt-4">
                  <button type="submit" class="btn btn-update rounded-pill">
                    <i class="bi bi-arrow-repeat"></i> Actualizar Ahora
                  </button>

                  <a
                    href="{% url 'ver_perfil' %}"
                    class="btn btn-outline-light btn-sm rounded-pill"
                  >
                    <i class="bi bi-x-circle"></i> Cancelar
                  </a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer class="text-center py-4 mt-auto">
      <p class="text-white-50 small">
        Tienda Coldplay | Protocolo de Seguridad
      </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
