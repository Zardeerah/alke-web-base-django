{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Configuración de Cuenta - Tienda Coldplay</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'web/css/estilos.css' %}" />

    <style>
      /* FONDO UNIFICADO */
      body {
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        min-height: 100vh;
        color: white;
      }

      /* TARJETA DE FORMULARIO GLASSMORPHISM */
      .form-glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      }

      /* ESTILO DE LOS INPUTS */
      .form-control {
        background: rgba(255, 255, 255, 0.1) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        color: white !important;
        border-radius: 10px;
        padding: 12px;
      }

      .form-control:focus {
        background: rgba(255, 255, 255, 0.15) !important;
        border-color: #2afadf !important;
        box-shadow: 0 0 10px rgba(42, 250, 223, 0.3);
      }

      .form-label {
        color: #2afadf;
        font-weight: bold;
        font-size: 0.9rem;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      /* BOTONES */
      .btn-save {
        background: linear-gradient(45deg, #2afadf, #4facfe);
        border: none;
        color: #000;
        font-weight: bold;
        transition: 0.3s;
      }

      .btn-save:hover {
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(42, 250, 223, 0.4);
        color: #000;
      }

      .btn-outline-warning-custom {
        border: 1px solid #ffc107;
        color: #ffc107;
        transition: 0.3s;
      }

      .btn-outline-warning-custom:hover {
        background: #ffc107;
        color: #000;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'inicio' %}"
          >Tienda Coldplay</a
        >
        <div class="ms-auto">
          <a
            href="{% url 'ver_perfil' %}"
            class="btn btn-sm btn-outline-light rounded-pill"
          >
            <i class="bi bi-person"></i> Ver Perfil
          </a>
        </div>
      </div>
    </nav>

    <div class="container mt-5 mb-5">
      <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
          <div class="form-glass">
            <h2 class="text-center mb-4 fw-bold">
              <i class="bi bi-gear-fill"></i> Editar Mi Cuenta
            </h2>
            <p class="text-center text-white-50 mb-5">
              Actualiza tu información de contacto y envío
            </p>

            <form method="POST">
              {% csrf_token %}

              <div class="mb-4">
                <label class="form-label"
                  ><i class="bi bi-envelope"></i> Email</label
                >
                <input
                  type="email"
                  name="email"
                  class="form-control"
                  value="{{ user.email }}"
                  placeholder="tu@email.com"
                />
              </div>

              <div class="mb-4">
                <label class="form-label"
                  ><i class="bi bi-geo-alt"></i> Dirección de Despacho</label
                >
                <input
                  type="text"
                  name="direccion"
                  class="form-control"
                  value="{{ perfil.direccion }}"
                  placeholder="Calle, Número, Ciudad"
                />
              </div>

              <div class="mb-4">
                <label class="form-label"
                  ><i class="bi bi-telephone"></i> Teléfono</label
                >
                <input
                  type="text"
                  name="telefono"
                  class="form-control"
                  value="{{ perfil.telefono }}"
                  placeholder="+56 9 XXXX XXXX"
                />
              </div>

              <div class="d-grid gap-3 pt-3">
                <button type="submit" class="btn btn-save btn-lg rounded-pill">
                  <i class="bi bi-check-circle"></i> Guardar Cambios
                </button>

                <a
                  href="{% url 'cambiar_password' %}"
                  class="btn btn-outline-warning-custom rounded-pill"
                >
                  <i class="bi bi-lock"></i> Cambiar Contraseña
                </a>

                <a
                  href="{% url 'inicio' %}"
                  class="btn btn-link text-white-50 text-decoration-none text-center"
                >
                  <i class="bi bi-x-circle"></i> Cancelar y Volver
                </a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <footer class="text-center py-4 mt-auto">
      <p class="text-white-50 small">Tienda Coldplay | Edición de Perfil</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
