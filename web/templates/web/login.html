{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>

    <link rel="stylesheet" href="{% static 'web/css/estilos.css' %}" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
      <div class="container">
        <a class="navbar-brand" href="#">Tienda Coldplay</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="#">Inicio</a>
            </li>

            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                data-bs-toggle="dropdown"
              >
                Productos
              </a>

              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Poleras</a></li>

                <li><a class="dropdown-item" href="#">Polerones</a></li>

                <li><a class="dropdown-item" href="#">Accesorios</a></li>
              </ul>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'login' %}">Login</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{% url 'contacto' %}">Contacto</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container mt-5">
      <h2>Iniciar Sesión</h2>

      <div class="card p-4">
        <form method="POST">
          {% csrf_token %}

          <div class="mb-3">
            <label>Usuario</label>
            <input type="text" name="username" class="form-control" />
          </div>

          <div class="mb-3">
            <label>Contraseña</label>
            <input type="password" name="password" class="form-control" />
          </div>

          <button class="btn btn-dark">Entrar</button>
        </form>
      </div>
    </div>
  </body>
</html>
